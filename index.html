// ─── MARKDOWN PARSER ──────────────────────────────────────────────────────────
function md(text) {
  let out = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  out = out.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/\*(.*?)\*/g, '<em>$1</em>');

  const lines = out.split('\n');
  const result = [];
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith('## ')) {
      result.push({ type: 'block', html: `<h3 class="mh">${line.slice(3)}</h3>` });
      i++; continue;
    }
    if (line.startsWith('### ')) {
      result.push({ type: 'block', html: `<h4 class="mh4">${line.slice(4)}</h4>` });
      i++; continue;
    }
    if (line.trim() === '---') {
      result.push({ type: 'block', html: '<hr class="mhr">' });
      i++; continue;
    }
    if (line.startsWith('- ')) {
      const items = [];
      while (i < lines.length && lines[i].startsWith('- ')) {
        items.push(`<li>${lines[i].slice(2)}</li>`);
        i++;
      }
      result.push({ type: 'block', html: `<ul class="mul">${items.join('')}</ul>` });
      continue;
    }
    if (line.trim() === '') {
      result.push({ type: 'break' });
      i++; continue;
    }
    result.push({ type: 'text', content: line });
    i++;
  }

  // Group text lines into paragraphs
  const final = [];
  let pBuf = [];
  for (const r of result) {
    if (r.type === 'text') {
      pBuf.push(r.content);
    } else {
      if (pBuf.length) { final.push(`<p>${pBuf.join('<br>')}</p>`); pBuf = []; }
      if (r.type === 'block') final.push(r.html);
    }
  }
  if (pBuf.length) final.push(`<p>${pBuf.join('<br>')}</p>`);
  return final.join('\n');
}

// ─── STREAMING WORD ANIMATION ─────────────────────────────────────────────────
function streamHTML(element, htmlContent, onDone) {
  element.innerHTML = htmlContent;

  const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);
  const textNodes = [];
  let node;
  while ((node = walker.nextNode())) {
    if (node.textContent.trim()) textNodes.push(node);
  }

  let delay = 0;
  const SPEED_MS = 20;

  textNodes.forEach(tn => {
    const words = tn.textContent.split(/(\s+)/);
    const frag = document.createDocumentFragment();
    words.forEach(word => {
      if (!word.trim()) {
        frag.appendChild(document.createTextNode(word));
        return;
      }
      const span = document.createElement('span');
      span.className = 'w';
      span.textContent = word;
      span.style.animationDelay = `${delay}ms`;
      delay += SPEED_MS;
      frag.appendChild(span);
    });
    tn.parentNode.replaceChild(frag, tn);
  });

  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  element.appendChild(cursor);

  const totalDuration = delay + 300;
  setTimeout(() => {
    cursor.remove();
    onDone && onDone();
  }, totalDuration);
}

// ─── CHAT LOGIC ───────────────────────────────────────────────────────────────
function showChat() {
  if (!chatActive) {
    chatActive = true;
    document.getElementById('welcome').hidden = true;
    const msgs = document.getElementById('messages');
    msgs.hidden = false;
  }
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.innerHTML = `<div class="msg-bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
  msgs.appendChild(div);
  scrollToBottom();
}

function addThinkingIndicator() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-bot';
  div.id = 'thinking';
  div.innerHTML = `
    <div class="bot-avatar"><span>W</span></div>
    <div class="msg-body">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
    </div>`;
  msgs.appendChild(div);
  scrollToBottom();
  return div;
}

function renderSuggestions(ids) {
  const el = document.getElementById('suggestions');
  el.innerHTML = '';
  ids.forEach(id => {
    if (!QA[id]) return;
    const btn = document.createElement('button');
    btn.className = 'suggestion-chip';
    btn.textContent = QA[id].question;
    btn.addEventListener('click', () => triggerQuestion(id));
    el.appendChild(btn);
  });
}

function setActiveNav(id) {
  if (activeNavBtn) activeNavBtn.classList.remove('active');
  const btn = document.querySelector(`.nav-btn[data-qa="${id}"]`);
  if (btn) { btn.classList.add('active'); activeNavBtn = btn; }
}

function deliverAnswer(qaId) {
  const qa = QA[qaId];
  const thinking = addThinkingIndicator();
  const delay = 800 + Math.random() * 500;

  setTimeout(() => {
    thinking.remove();
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg msg-bot';
    div.innerHTML = `<div class="bot-avatar"><span>W</span></div><div class="msg-body msg-content"></div>`;
    msgs.appendChild(div);
    const contentEl = div.querySelector('.msg-content');
    streamHTML(contentEl, md(qa.answer), () => {
      isStreaming = false;
      renderSuggestions(qa.suggestions);
      scrollToBottom();
    });
    scrollToBottom();
  }, delay);
}

function triggerQuestion(id) {
  if (isStreaming) return;
  const qa = QA[id];
  if (!qa) return;

  isStreaming = true;
  showChat();
  setActiveNav(id);
  renderSuggestions([]);

  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');

  addUserMessage(qa.question);
  setTimeout(() => deliverAnswer(id), 50);
}

function matchQuestion(input) {
  const lower = input.toLowerCase();
  let best = null, bestScore = 0;
  KEYWORD_MAP.forEach(({ keys, id }) => {
    let score = 0;
    keys.forEach(k => { if (lower.includes(k)) score++; });
    if (score > bestScore) { bestScore = score; best = id; }
  });
  return bestScore > 0 ? best : null;
}

function handleSend() {
  const input = document.getElementById('inputText');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  input.value = '';
  input.style.height = '';
  document.getElementById('sendBtn').disabled = true;

  const matched = matchQuestion(text);
  isStreaming = true;
  showChat();
  renderSuggestions([]);
  addUserMessage(text);

  if (matched) {
    setActiveNav(matched);
    setTimeout(() => deliverAnswer(matched), 50);
  } else {
    setTimeout(() => {
      const thinking = addThinkingIndicator();
      setTimeout(() => {
        thinking.remove();
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'msg msg-bot';
        div.innerHTML = `<div class="bot-avatar"><span>W</span></div><div class="msg-body msg-content"></div>`;
        msgs.appendChild(div);
        const fallback = `I can answer questions about Will's **experience**, **projects**, **certifications**, **education**, **leadership**, **skills**, **recommendations**, or how to **contact** him. Try one of the suggestions below!`;
        streamHTML(div.querySelector('.msg-content'), md(fallback), () => {
          isStreaming = false;
          renderSuggestions(['about', 'experience', 'contact']);
          scrollToBottom();
        });
        scrollToBottom();
      }, 700);
    }, 50);
  }
}

function resetChat() {
  chatActive = false;
  isStreaming = false;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('messages').hidden = true;
  document.getElementById('welcome').hidden = false;
  document.getElementById('suggestions').innerHTML = '';
  document.getElementById('inputText').value = '';
  document.getElementById('sendBtn').disabled = true;
  if (activeNavBtn) { activeNavBtn.classList.remove('active'); activeNavBtn = null; }
}

// ─── THEME ────────────────────────────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}

// ─── SIDEBAR (MOBILE) ─────────────────────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.prompt-card').forEach(btn => {
    btn.addEventListener('click', () => triggerQuestion(btn.dataset.qa));
  });
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => triggerQuestion(btn.dataset.qa));
  });
  document.getElementById('newChatBtn').addEventListener('click', resetChat);
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);
  document.getElementById('mobileThemeBtn').addEventListener('click', toggleTheme);
  document.getElementById('mobileSidebarBtn').addEventListener('click', openSidebar);
  document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

  const inputText = document.getElementById('inputText');
  const sendBtn = document.getElementById('sendBtn');

  inputText.addEventListener('input', () => {
    inputText.style.height = 'auto';
    inputText.style.height = Math.min(inputText.scrollHeight, 160) + 'px';
    sendBtn.disabled = !inputText.value.trim();
  });
  inputText.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) handleSend();
    }
  });
  sendBtn.addEventListener('click', handleSend);
});
</script>
